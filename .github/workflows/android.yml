name: Android CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codi del repositori
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Missatge INICI
        run: echo ">>> INICI DEL PIPELINE: Iniciant construcció i tests de l'app Android <<<"

      - name: Donar permisos a Gradle
        run: chmod +x gradlew

      - name: BUILD - Construir l'aplicació
        run: ./gradlew build

      - name: TEST - Executar tots els tests
        run: ./gradlew test

      - name: Missatge FINAL
        run: echo ">>> PIPELINE COMPLETAT: Build i tests executats correctament <<<"
